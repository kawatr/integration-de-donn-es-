version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: opensound
      POSTGRES_PASSWORD: opensound
      POSTGRES_DB: opensound
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:2.8.0
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://opensound:opensound@postgres/opensound
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: opensound_secret
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@opensound.com && airflow webserver & airflow scheduler"

  dashboard:
    image: python:3.11-slim
    depends_on:
      - postgres
    volumes:
      - ./dashboard:/app
    working_dir: /app
    command: bash -c "pip install streamlit psycopg2-binary pandas plotly -q && streamlit run app.py --server.port 8501"
    ports:
      - "8501:8501"

volumes:
  pg_data: